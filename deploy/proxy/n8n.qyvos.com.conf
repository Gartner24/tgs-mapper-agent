# n8n.qyvos.com -- TGS Mapper Agent (n8n UI + Telegram webhook)

server {
    listen 80;
    server_name n8n.qyvos.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name n8n.qyvos.com;

    ssl_certificate     /etc/letsencrypt/live/n8n.qyvos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.qyvos.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Large payloads for PDFs sent via Telegram
    client_max_body_size 32M;

    # WebSocket / long-poll support required by n8n
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Docker DNS resolver -- forces runtime re-resolution of container IPs
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $n8n_upstream http://tgs-n8n:5678;

    location / {
        proxy_pass $n8n_upstream;
    }
}
