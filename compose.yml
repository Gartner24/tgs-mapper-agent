services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: tgs-n8n
    env_file: .env
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=America/Bogota
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_PAYLOAD_SIZE_MAX=32
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    expose:
      - "5678"
    networks:
      - web
    depends_on:
      crewai:
        condition: service_healthy
    restart: unless-stopped

  crewai:
    build: ./crew
    container_name: tgs-crewai
    env_file: .env
    expose:
      - "8000"
    networks:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  openclaw:
    image: alpine/openclaw:2026.5.20
    container_name: tgs-openclaw
    env_file: .env
    # OpenClaw owns the single Telegram bot (inherits TELEGRAM_BOT_TOKEN from
    # .env). n8n no longer uses a Telegram trigger; it serves the analysis
    # webhook that OpenClaw calls.
    depends_on:
      crewai:
        condition: service_healthy
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - ./openclaw/workspace:/app/workspace
    expose:
      - "18789"
    networks:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  n8n_data:

networks:
  web:
    external: true
